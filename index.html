<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryo Community | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(255, 0, 0, 0.1);
        }

        /* بديل اللوجو في حال تعطل الصورة */
        .logo-placeholder {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #ff0000, #800000);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: 900;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            border: 4px solid #050505;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: #fff;
        }

        .highlight { color: #ff0000; }

        p {
            color: #aaa;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn {
            display: block;
            background: #ff0000;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            background: #ff3333;
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.5);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-placeholder">R</div>
        
        <h1>RYO <span class="highlight">COMMUNITY</span></h1>
        
        <p>المجتمع العربي الأول لتطوير البوتات، أنظمة الحماية، وحلول الألعاب المتقدمة. انضم إلينا الآن لنبدأ الرحلة.</p>
        
        <a href="https://discord.gg/r8SKT4wcH" class="btn">دخول السيرفر</a>
        
        <div class="footer">DESIGN & DEV BY RYO</div>
    </div>

</body>
</html>
