<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryo Community | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root {
            --primary: #ff0000;
            --dark-red: #8b0000;
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* خلفية نيون متحركة */
        .background-animate {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #250000 0%, #050505 100%);
            z-index: -1;
        }

        .glow {
            position: absolute;
            width: 400px; height: 400px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            animation: moveGlow 15s infinite alternate;
        }

        @keyframes moveGlow {
            0% { transform: translate(-20%, -20%); }
            100% { transform: translate(20%, 20%); }
        }

        /* حاوية الموقع */
        .container {
            text-align: center;
            padding: 40px;
            width: 100%;
            max-width: 650px;
            z-index: 1;
        }

        /* اللوجو الدائري الاحترافي */
        .logo-wrapper {
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            position: relative;
            padding: 5px;
            background: linear-gradient(45deg, var(--primary), transparent);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .highlight {
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
        }

        p {
            color: #b0b0b0;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        /* أزرار العمليات */
        .cta-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            width: 100%;
            max-width: 350px;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2);
        }

        .btn-primary:hover {
            background: #ff3333;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* العدادات */
        .status-bar {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        .status-item span {
            color: #00ff88;
            margin-left: 5px;
        }

    </style>
</head>
<body>

    <div class="background-animate"></div>
    <div class="glow"></div>

    <div class="container">
        <div class="logo-wrapper">
            <img src="https://i.postimg.cc/9XvXQp6G/7921.png" alt="Ryo Logo" class="logo-img">
        </div>

        <h1>RYO <span class="highlight">COMMUNITY</span></h1>
        <p>نحن نصنع المستقبل الرقمي. مجتمع متخصص في تطوير البرمجيات، حماية الأنظمة، وأقوى سكربتات الألعاب في الوطن العربي.</p>

        <div class="cta-group">
            <a href="https://discord.gg/r8SKT4wcH" target="_blank" class="btn btn-primary">
                انضم إلى السيرفر
            </a>
            <a href="#" class="btn btn-secondary" onclick="copyLink()">
                نسخ رابط الدعوة
            </a>
        </div>

        <div class="status-bar">
            <div class="status-item">الحالة: <span>متصل ⬤</span></div>
            <div class="status-item">المجال: <span>تطوير وبرمجة</span></div>
        </div>
    </div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText('https://discord.gg/r8SKT4wcH');
            alert('تم نسخ الرابط! يمكنك مشاركته الآن.');
        }
    </script>

</body>
</html>
