<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryo Community | الموقع الرسمي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            /* استخدمنا الصورة العريضة التي أرسلتها كخلفية احترافية */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://i.postimg.cc/mD700zS3/7923.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo-wrapper {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #ff0000, transparent);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #050505;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff, #cc0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #ccc;
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.7;
        }

        .btn-discord {
            display: inline-block;
            background: #cc0000;
            color: white;
            padding: 16px 45px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(204, 0, 0, 0.4);
        }

        .btn-discord:hover {
            background: #ff0000;
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 0, 0, 0.6);
        }

        .footer-tag {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <img src="https://i.postimg.cc/9XvXQp6G/7921.png" alt="Ryo Logo" class="logo-img">
        </div>

        <h1>RYO COMMUNITY</h1>
        <p>المجتمع العربي الأول لتطوير البوتات، أنظمة الحماية، وحلول الألعاب المتقدمة. انضم إلينا الآن لنبدأ الرحلة.</p>

        <a href="https://discord.gg/r8SKT4wcH" target="_blank" class="btn-discord">دخول السيرفر</a>

        <div class="footer-tag">Design & Dev by Ryo</div>
    </div>

</body>
</html>
